<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered accident hotspot prediction system using DBSCAN clustering and Random Forest ML for road safety analysis in India" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://a.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://b.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://c.basemaps.cartocdn.com" />
    
    <!-- Critical CSS for initial render -->
    <style>
      :root{--clr-bg:#0f1117;--clr-surface:#1a1d27;--clr-surface-2:#242836;--clr-border:#2e3348;--clr-text:#e4e6f0;--clr-text-muted:#8b8fa8;--clr-primary:#6366f1;--clr-primary-light:#818cf8;--clr-danger:#ef4444;--clr-warning:#f59e0b;--clr-success:#22c55e;--clr-info:#3b82f6}
      *{box-sizing:border-box}
      html,body{margin:0;padding:0;height:100%;overflow-x:hidden}
      body{font-family:system-ui,-apple-system,sans-serif;background:var(--clr-bg);color:var(--clr-text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeSpeed}
      #root{min-height:100vh;display:flex;width:100%}
      .flex{display:flex}
      .h-screen{height:100vh}
      .overflow-hidden{overflow:hidden}
      .w-full{width:100%}
      img{content-visibility:auto}
      @keyframes spin{to{transform:rotate(360deg)}}
      .animate-spin{animation:spin 1s linear infinite}
      @media (max-width:768px){body{font-size:14px}}
    </style>
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
    
    <title>AcciHotspot — AI Accident Hotspot Prediction System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
